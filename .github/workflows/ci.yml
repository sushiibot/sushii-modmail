name: CI

on:
  push:
    paths-ignore:
      - "docs/**"
      - "README.md"
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun test

  docker-build:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: sushiibot/sushii-workflows/.github/workflows/docker-build.yml@main
    with:
      image_name: ghcr.io/sushiibot/modmail
    permissions:
      contents: read
      packages: write

  deploy-staging:
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: sushiibot/sushii-workflows/.github/workflows/deploy.yml@main
    with:
      service: modmail/sushii-modmail-staging
      host: apps
      image_version: ${{ needs.docker-build.outputs.image_version }}
      environment: staging
    secrets: inherit

  docker-cleanup:
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: sushiibot/sushii-workflows/.github/workflows/docker-cleanup.yml@main
    with:
      image_name: ghcr.io/sushiibot/modmail
    permissions:
      packages: write
